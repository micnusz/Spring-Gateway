spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      routes:

        - id: user-service
          uri: http://user-service:8080
          predicates:
            - Path=/api/users/**
          filters:
            - RewritePath=/api/users/(?<segment>.*), /${segment}

        - id: role-service
          uri: http://role-service:8080
          predicates:
            - Path=/api/roles/**
          filters:
          - RewritePath=/api/users/(?<segment>.*), /${segment}