spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: user-service
              uri: http://user-service:8080
              predicates:
                - Path=/api/users/**
              filters:
                - StripPrefix=2
                - name: CircuitBreaker
                  args:
                    name: userServiceCB
                    fallbackUri: forward:/fallback/user-service
                - name: Retry
                  args:
                    retries: 3
                    statuses: BAD_GATEWAY, SERVICE_UNAVAILABLE, GATEWAY_TIMEOUT
                    methods: GET
                    backoff:
                      firstBackoff: 100ms
                      maxBackoff: 500ms
                      factor: 2

            - id: role-service
              uri: http://role-service:8080
              predicates:
                - Path=/api/roles/**
              filters:
                - StripPrefix=2
                - name: CircuitBreaker
                  args:
                    name: roleServiceCB
                    fallbackUri: forward:/fallback/role-service
                - name: Retry
                  args:
                    retries: 3
                    statuses: BAD_GATEWAY, SERVICE_UNAVAILABLE, GATEWAY_TIMEOUT
                    methods: GET
                    backoff:
                      firstBackoff: 100ms
                      maxBackoff: 500ms
                      factor: 2

resilience4j:
  circuitbreaker:
    instances:
      userServiceCB:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
        slow-call-duration-threshold: 2s
        slow-call-rate-threshold: 50
      roleServiceCB:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
        slow-call-duration-threshold: 2s
        slow-call-rate-threshold: 50

  timelimiter:
    instances:
      userServiceCB:
        timeout-duration: 3s
        cancel-running-future: true
      roleServiceCB:
        timeout-duration: 3s
        cancel-running-future: true

logging:
  level:
    org.springframework.cloud.gateway: TRACE
    io.github.resilience4j: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    gateway:
      enabled: true
    health:
      show-details: always
  health:
    circuitbreakers:
      enabled: true

security:
  jwt:
    secret-key: ${SECURITY_JWT_SECRET_KEY}