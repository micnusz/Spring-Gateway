services:

  gateway:
    build: ./gateway
    image: gateway
    ports:
      - "8080:8080"
    depends_on:
      - user-service
      - role-service
      - auth-service
    environment:
      - SECURITY_JWT_SECRET_KEY=${SECURITY_JWT_SECRET_KEY}

  auth-service:
    build: ./authService
    image: auth-service
    ports:
      - "8083:8080"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/authdb
      - SPRING_DATASOURCE_USERNAME=${POSTGRES_USER}
      - SPRING_DATASOURCE_PASSWORD=${POSTGRES_PASSWORD}
      - SECURITY_JWT_SECRET_KEY=${SECURITY_JWT_SECRET_KEY}

  user-service:
    build: ./userService
    image: user-service
    ports:
      - "8081:8080"

  role-service:
    build: ./roleService
    image: role-service
    ports:
      - "8082:8080"

  postgres:
    image: postgres:16
    environment:
      - POSTGRES_DB=authdb
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d authdb" ]
      interval: 5s
      timeout: 5s
      retries: 5

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    depends_on:
      - gateway

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - prometheus


volumes:
  postgres_data: